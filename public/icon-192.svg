<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <!-- 光泽叠加 -->
  <rect width="192" height="192" rx="44" fill="url(#gloss)"/>
  <!-- 星点装饰 -->
  <circle cx="30" cy="38" r="3.5" fill="white" opacity="0.5"/>
  <circle cx="155" cy="28" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="20" cy="145" r="2.8" fill="white" opacity="0.35"/>
  <circle cx="168" cy="140" r="3" fill="white" opacity="0.45"/>
  <circle cx="85" cy="160" r="2" fill="white" opacity="0.25"/>
  <circle cx="50" cy="20" r="1.8" fill="white" opacity="0.3"/>
  <!-- 主字 -->
  <text x="96" y="118" fill="white" font-size="90" font-weight="bold" font-family="'SimHei','PingFang SC','Microsoft YaHei',sans-serif" text-anchor="middle">瞬</text>
  <!-- 底部装饰 -->
  <rect x="48" y="152" width="96" height="3" rx="1.5" fill="white" opacity="0.3"/>
</svg>
